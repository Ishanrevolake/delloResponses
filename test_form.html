<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Form Integration</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 15px;
            background: #000;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h2>Contact Us</h2>
    <form id="contactForm">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea name="message" required rows="4"></textarea>
        </div>
        <button type="submit">Send Message</button>
    </form>
    <p id="status"></p>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusEl = document.getElementById('status');
            statusEl.textContent = "Sending...";

            // 1. Collect form data automatically
            const formData = new FormData(e.target);
            const dataObj = Object.fromEntries(formData.entries());

            try {
                // 2. Send POST request to your Dashboard API
                const response = await fetch('http://localhost:3000/api/responses', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        // IMPORTANT: Replace this with an actual Website ID from the dashboard
                        website_id: '2c6f4421-4634-42d1-8f32-965f5233f239',
                        data: dataObj // The dynamic form fields (name, email, message, etc.)
                    })
                });

                if (response.ok) {
                    statusEl.textContent = "✅ Success! Message sent.";
                    e.target.reset(); // clear form
                } else {
                    const err = await response.json();
                    statusEl.textContent = "❌ Error: " + (err.error || "Failed to send");
                }
            } catch (error) {
                statusEl.textContent = "❌ Error: " + error.message;
            }
        });
    </script>
</body>

</html>
